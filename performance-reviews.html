<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="auth-guard.js"></script>
    <title>Performance Reviews - ModernTech Solutions</title>
    <link rel="stylesheet" href="combined-styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page-reviews">
    <header class="header">
      <div class="nav">
        <div class="logo">Modern<span>Tech</span></div>
        <button
          class="nav-toggle"
          aria-label="Toggle menu"
          aria-expanded="false"
        >
          <span></span><span></span><span></span>
        </button>
        <div class="nav-bar">
          <ul class="nav-content">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="employees.html">Employees</a></li>
            <li><a href="payroll.html">Payroll</a></li>
            <li><a href="time-off-page.html">Time Off</a></li>
            <li><a href="Modern Tech/attendance.html">Attendance</a></li>
            <li class="active">
              <a href="performance-reviews.html">Performance Reviews</a>
            </li>
            <li>
              <a
                href="#"
                onclick="
                  localStorage.removeItem('moderntech_auth');
                  window.location.href = 'index.html';
                  return false;
                "
                >Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
      <h1>Performance Reviews</h1>
      <p class="subtitle">Track review cycles and outcomes across the team</p>
    </header>

    <div class="reviews-container">
      <div class="employee-panel">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search employees"
        />

        <!-- Populated dynamically by reviews.js from data/employee_info.json -->
        <div class="employee-list" id="employeeList">
          <p class="employee-meta">Loading employees...</p>
        </div>
      </div>

      <div class="detail-panel">
        <div class="detail-header">
          <img class="avatar avatar-lg" src="" alt="" />
          <div>
            <h2 id="selectedName">Loading...</h2>
            <p id="selectedMeta"></p>
          </div>
        </div>

        <div class="history-section">
          <h3>Review history</h3>

          <!-- Populated dynamically by reviews.js -->
          <div class="timeline" id="reviewHistory"></div>
        </div>

        <div class="form-section">
          <h3>New review form</h3>

          <form class="review-form" id="reviewForm">
            <div class="form-row">
              <select class="form-select" id="reviewPeriod">
                <option value="">Review period</option>
                <option value="Q3-2026">Q3 2026</option>
                <option value="Q2-2026">Q2 2026</option>
                <option value="Q1-2026">Q1 2026</option>
              </select>

              <select class="form-select" id="reviewer">
                <option value="">Reviewer</option>
                <option value="sarah-johnson">Sarah Johnson</option>
              </select>
            </div>

            <div class="sliders-row">
              <div class="slider-group">
                <label for="technicalSkill">Technical skill</label>
                <input
                  type="range"
                  id="technicalSkill"
                  min="0"
                  max="5"
                  step="0.5"
                  value="2.5"
                />
              </div>

              <div class="slider-group">
                <label for="collaboration">Collaboration</label>
                <input
                  type="range"
                  id="collaboration"
                  min="0"
                  max="5"
                  step="0.5"
                  value="2.5"
                />
              </div>

              <div class="slider-group">
                <label for="communication">Communication</label>
                <input
                  type="range"
                  id="communication"
                  min="0"
                  max="5"
                  step="0.5"
                  value="2.5"
                />
              </div>
            </div>

            <textarea
              class="form-textarea"
              id="strengths"
              placeholder="Strengths"
              rows="3"
            ></textarea>
            <textarea
              class="form-textarea"
              id="areasToGrow"
              placeholder="Areas to grow"
              rows="3"
            ></textarea>

            <div class="form-actions">
              <button type="button" class="btn-secondary" id="saveDraftBtn">
                Save draft
              </button>
              <button type="submit" class="btn-primary" id="submitBtn">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
  <script src="nav.js"></script>
  <script src="performance-reviews.js"></script>
</html>
