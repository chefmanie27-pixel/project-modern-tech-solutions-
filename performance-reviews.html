<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Performance Reviews - ModernTech Solutions</title>
    <link rel="stylesheet" href="performance-reviews.css" />
  </head>
  <body>
    <header class="header">
      <div class="nav">
        <div class="logo">Modern<span>Tech</span></div>
        <div class="nav-bar">
          <ul class="nav-content">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="employees.html">Employees</a></li>
            <li><a href="payroll.html">Payroll</a></li>
            <li><a href="time-off.html">Time Off</a></li>
            <li class="active"><a href="performance-reviews.html">Performance Reviews</a></li>
          </ul>
        </div>
      </div>
      <h1>Performance Reviews</h1>
      <p class="subtitle">Track review cycles and outcomes across the team</p>
    </header>

    <div class="reviews-container">
      <div class="employee-panel">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search employees"
        />

        
        <div class="employee-list" id="employeeList"></div>
      </div>

      <div class="detail-panel">
        <div class="detail-header">
          <img class="avatar avatar-lg" id="selectedAvatar" src="" alt="" />
          <div>
            <h2 id="selectedName"></h2>
            <p id="selectedMeta"></p>
          </div>
          <button class="btn-primary" id="newReviewBtn">+ New review</button>
        </div>

        <div class="history-section">
          <h3>Review history</h3>

         
          <div class="timeline" id="reviewHistory"></div>
        </div>

        <div class="form-section">
          <h3>New review form</h3>

          <form class="review-form" id="reviewForm">
            <div class="form-row">
              <select class="form-select" id="reviewPeriod">
                <option value="">Review period</option>
                <option value="Q3-2026">Q3 2026</option>
                <option value="Q2-2026">Q2 2026</option>
                <option value="Q1-2026">Q1 2026</option>
              </select>

              
              <select class="form-select" id="reviewer" disabled>
                <option value="sarah-johnson" selected>Sarah Johnson (HR Manager)</option>
              </select>
            </div>

            <div class="sliders-row">
              <div class="slider-group">
                <label for="technicalSkill">Technical skill</label>
                <input
                  type="range"
                  id="technicalSkill"
                  min="0"
                  max="5"
                  step="0.5"
                  value="2.5"
                />
              </div>

              <div class="slider-group">
                <label for="collaboration">Collaboration</label>
                <input
                  type="range"
                  id="collaboration"
                  min="0"
                  max="5"
                  step="0.5"
                  value="2.5"
                />
              </div>

              <div class="slider-group">
                <label for="communication">Communication</label>
                <input
                  type="range"
                  id="communication"
                  min="0"
                  max="5"
                  step="0.5"
                  value="2.5"
                />
              </div>
            </div>

            <textarea
              class="form-textarea"
              id="strengths"
              placeholder="Strengths"
              rows="3"
            ></textarea>
            <textarea
              class="form-textarea"
              id="areasToGrow"
              placeholder="Areas to grow"
              rows="3"
            ></textarea>

            <div class="form-actions">
              <button type="button" class="btn-secondary" id="saveDraftBtn">
                Save draft
              </button>
              <button type="submit" class="btn-primary" id="submitBtn">
                Submit
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="performance-reviews.js"></script>
  </body>
</html>
