<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="auth-guard.js"></script>
    <title>ModernTech | Employee Management</title>
    <link rel="stylesheet" href="combined-styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="page-employees">
    <!-- Top Navigation -->
    <div class="nav">
      <div class="logo">Modern<span>Tech</span></div>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-bar">
        <ul class="nav-content">
          <li><a href="dashboard.html">Dashboard</a></li>
          <li class="active"><a href="employees.html">Employees</a></li>
          <li><a href="payroll.html">Payroll</a></li>
          <li><a href="time-off-page.html">Time Off</a></li>
          <li><a href="Modern Tech/attendance.html">Attendance</a></li>
          <li><a href="performance-reviews.html">Performance Reviews</a></li>
          <li>
            <a
              href="#"
              onclick="
                localStorage.removeItem('moderntech_auth');
                window.location.href = 'login.html';
                return false;
              "
              >Logout</a
            >
          </li>
        </ul>
      </div>
    </div>

    <!-- Core Title Headers -->
    <div class="header">
      <h1>Employee Management</h1>
      <p>View, edit, and maintain active employee listings.</p>
    </div>

    <!-- Interface Control Action Block -->
    <div class="action-container">
      <button class="btn btn-edit-mode" id="employeeBtn">Edit Employees</button>
      <button class="btn btn-add" id="addEmployeeBtn">+ Add Employee</button>
      <button
        class="btn btn-reset"
        id="resetBtn"
        title="Restore the default demo dataset"
      >
        Reset to Defaults
      </button>
    </div>

    <!-- Main Content Presentation Table Wrapper -->
    <div class="main-content">
      <table class="employee-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Position</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Employment History</th>
            <th>Contact</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="employee-rows"></tbody>
      </table>
    </div>

    <!-- Hidden Creative Input Overlay Container (Modal) -->
    <div class="modal" id="addModal">
      <div class="modal-content">
        <h3>Add New Employee</h3>
        <form id="addEmployeeForm">
          <div class="form-group">
            <label>Full Name</label>
            <input
              type="text"
              id="newName"
              placeholder="e.g. John Doe"
              required
            />
          </div>
          <div class="form-group">
            <label>Position</label>
            <input
              type="text"
              id="newPosition"
              placeholder="e.g. Backend Developer"
              required
            />
          </div>
          <div class="form-group">
            <label>Department</label>
            <input
              type="text"
              id="newDepartment"
              placeholder="e.g. Engineering"
              required
            />
          </div>
          <div class="form-group">
            <label>Salary (R)</label>
            <input
              type="number"
              id="newSalary"
              placeholder="e.g. 65000"
              min="0"
              step="1"
              required
            />
          </div>
          <div class="form-group">
            <label>Employment History</label>
            <input
              type="text"
              id="newHistory"
              placeholder="e.g., Joined in 2026"
              required
            />
          </div>
          <div class="form-group">
            <label>Contact Email</label>
            <input
              type="email"
              id="newContact"
              placeholder="e.g. john.doe@moderntech.com"
              required
            />
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-cancel" id="closeModalBtn">
              Cancel
            </button>
            <button type="submit" class="btn btn-add">Save Employee</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      // ---- Shared storage keys (must match payroll.html) ----
      const EMPLOYEE_STORAGE_KEY = "moderntech_employees";
      const PAYROLL_META_KEY = "moderntech_payroll_meta";

      // Kept separately so "Reset to Defaults" always has a clean copy to
      // restore, even after data.employeeInformation has been mutated.
      const defaultEmployees = [
        {
          employeeId: 1,
          name: "Sibongile Nkosi",
          position: "Software Engineer",
          department: "Development",
          salary: 70000,
          employmentHistory: "Joined in 2015, promoted to Senior in 2018",
          contact: "sibongile.nkosi@moderntech.com",
        },
        {
          employeeId: 2,
          name: "Lungile Moyo",
          position: "HR Manager",
          department: "HR",
          salary: 80000,
          employmentHistory: "Joined in 2013, promoted to Manager in 2017",
          contact: "lungile.moyo@moderntech.com",
        },
        {
          employeeId: 3,
          name: "Thabo Molefe",
          position: "Quality Analyst",
          department: "QA",
          salary: 55000,
          employmentHistory: "Joined in 2018",
          contact: "thabo.molefe@moderntech.com",
        },
        {
          employeeId: 4,
          name: "Keshav Naidoo",
          position: "Sales Representative",
          department: "Sales",
          salary: 60000,
          employmentHistory: "Joined in 2020",
          contact: "keshav.naidoo@moderntech.com",
        },
        {
          employeeId: 5,
          name: "Zanele Khumalo",
          position: "Marketing Specialist",
          department: "Marketing",
          salary: 58000,
          employmentHistory: "Joined in 2019",
          contact: "zanele.khumalo@moderntech.com",
        },
        {
          employeeId: 6,
          name: "Sipho Zulu",
          position: "UI/UX Designer",
          department: "Design",
          salary: 65000,
          employmentHistory: "Joined in 2016",
          contact: "sipho.zulu@moderntech.com",
        },
        {
          employeeId: 7,
          name: "Naledi Moeketsi",
          position: "DevOps Engineer",
          department: "IT",
          salary: 72000,
          employmentHistory: "Joined in 2017",
          contact: "naledi.moeketsi@moderntech.com",
        },
        {
          employeeId: 8,
          name: "Farai Gumbo",
          position: "Content Strategist",
          department: "Marketing",
          salary: 56000,
          employmentHistory: "Joined in 2021",
          contact: "farai.gumbo@moderntech.com",
        },
        {
          employeeId: 9,
          name: "Karabo Dlamini",
          position: "Accountant",
          department: "Finance",
          salary: 62000,
          employmentHistory: "Joined in 2018",
          contact: "karabo.dlamini@moderntech.com",
        },
        {
          employeeId: 10,
          name: "Fatima Patel",
          position: "Customer Support Lead",
          department: "Support",
          salary: 58000,
          employmentHistory: "Joined in 2016",
          contact: "fatima.patel@moderntech.com",
        },
      ];

      let data = {
        employeeInformation: JSON.parse(JSON.stringify(defaultEmployees)),
      };

      const tableBody = document.getElementById("employee-rows");
      const employeeBtn = document.getElementById("employeeBtn");
      const addEmployeeBtn = document.getElementById("addEmployeeBtn");
      const resetBtn = document.getElementById("resetBtn");
      const addModal = document.getElementById("addModal");
      const closeModalBtn = document.getElementById("closeModalBtn");
      const addEmployeeForm = document.getElementById("addEmployeeForm");

      let isEditing = false;

      // ---- Validation ----
      const EMAIL_PATTERN = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function validateEmployee(emp) {
        if (!emp.name || !emp.name.trim()) {
          return "Name cannot be empty.";
        }
        if (!emp.position || !emp.position.trim()) {
          return "Position cannot be empty.";
        }
        if (!emp.department || !emp.department.trim()) {
          return "Department cannot be empty.";
        }
        if (isNaN(emp.salary) || emp.salary < 0) {
          return "Salary must be a number of 0 or more.";
        }
        if (!emp.contact || !EMAIL_PATTERN.test(emp.contact.trim())) {
          return "Contact must be a valid email address.";
        }
        return null;
      }

      // ---- Persistence layer (with error handling) ----
      function loadFromStorage() {
        const stored = localStorage.getItem(EMPLOYEE_STORAGE_KEY);
        if (stored) {
          try {
            data.employeeInformation = JSON.parse(stored);
            return;
          } catch (e) {
            console.warn("Corrupt employee data in storage, using defaults.");
          }
        }
        saveToStorage();
      }

      function saveToStorage() {
        try {
          localStorage.setItem(
            EMPLOYEE_STORAGE_KEY,
            JSON.stringify(data.employeeInformation),
          );
          return true;
        } catch (e) {
          console.error("Failed to save employee data:", e);
          alert(
            "Could not save changes to local storage. Your browser may be blocking storage (e.g. private browsing), or storage may be full.",
          );
          return false;
        }
      }

      // Removes any leftover payroll-only entries (hours/leave deductions)
      // for an employee that no longer exists, so localStorage doesn't
      // quietly accumulate orphaned records over time.
      function removeFromPayrollMeta(employeeId) {
        const stored = localStorage.getItem(PAYROLL_META_KEY);
        if (!stored) return;
        try {
          const meta = JSON.parse(stored);
          delete meta[employeeId];
          localStorage.setItem(PAYROLL_META_KEY, JSON.stringify(meta));
        } catch (e) {
          console.warn("Could not clean up payroll meta:", e);
        }
      }

      function renderTable() {
        tableBody.innerHTML = "";
        data.employeeInformation.forEach((employee) => {
          const row = document.createElement("tr");

          if (isEditing) {
            row.innerHTML = `
              <td>${employee.employeeId}</td>
              <td><input type="text" class="edit-input" data-id="${employee.employeeId}" data-field="name" value="${employee.name}"></td>
              <td><input type="text" class="edit-input" data-id="${employee.employeeId}" data-field="position" value="${employee.position}"></td>
              <td><input type="text" class="edit-input" data-id="${employee.employeeId}" data-field="department" value="${employee.department}"></td>
              <td><input type="number" class="edit-input" data-id="${employee.employeeId}" data-field="salary" min="0" value="${employee.salary}"></td>
              <td><input type="text" class="edit-input" data-id="${employee.employeeId}" data-field="employmentHistory" value="${employee.employmentHistory}"></td>
              <td><input type="email" class="edit-input" data-id="${employee.employeeId}" data-field="contact" value="${employee.contact}"></td>
              <td class="text-center">
                <button class="btn-delete" onclick="deleteEmployee(${employee.employeeId})">Delete</button>
              </td>
            `;
          } else {
            row.innerHTML = `
              <td>${employee.employeeId}</td>
              <td><strong>${employee.name}</strong></td>
              <td>${employee.position}</td>
              <td><span class="dept-tag">${employee.department}</span></td>
              <td>R ${employee.salary.toLocaleString()}</td>
              <td>${employee.employmentHistory}</td>
              <td><a href="mailto:${employee.contact}">${employee.contact}</a></td>
              <td class="text-center">
                <button class="btn-delete" onclick="deleteEmployee(${employee.employeeId})">Delete</button>
              </td>
            `;
          }
          tableBody.appendChild(row);
        });
      }

      function deleteEmployee(id) {
        const targetEmployee = data.employeeInformation.find(
          (emp) => emp.employeeId === id,
        );
        if (!targetEmployee) return;

        const confirmDelete = confirm(
          `Are you sure you want to remove ${targetEmployee.name} from the system?`,
        );
        if (confirmDelete) {
          data.employeeInformation = data.employeeInformation.filter(
            (emp) => emp.employeeId !== id,
          );
          if (saveToStorage()) {
            removeFromPayrollMeta(id);
          }
          renderTable();
        }
      }

      // Validates all edited rows before saving anything. If any row is
      // invalid, nothing is written to storage and the offending field is
      // flagged so edits aren't silently lost or half-applied.
      function saveChanges() {
        const inputs = document.querySelectorAll(".edit-input");
        const draft = JSON.parse(JSON.stringify(data.employeeInformation));
        let firstInvalid = null;

        inputs.forEach((input) => {
          const id = parseInt(input.getAttribute("data-id"));
          const field = input.getAttribute("data-field");
          let value = input.value;
          const employee = draft.find((emp) => emp.employeeId === id);
          if (employee) {
            if (field === "salary") value = parseFloat(value);
            employee[field] = value;
          }
        });

        for (const employee of draft) {
          const error = validateEmployee(employee);
          if (error) {
            firstInvalid = { employee, error };
            break;
          }
        }

        if (firstInvalid) {
          alert(
            `Could not save: ${firstInvalid.employee.name || "an employee"} — ${firstInvalid.error}`,
          );
          return false;
        }

        data.employeeInformation = draft;
        return saveToStorage();
      }

      employeeBtn.addEventListener("click", () => {
        if (!isEditing) {
          isEditing = true;
          employeeBtn.textContent = "Save Changes";
          employeeBtn.style.backgroundColor = "var(--success)";
          employeeBtn.style.color = "#ffffff";
          employeeBtn.style.borderColor = "transparent";
          renderTable();
        } else {
          const saved = saveChanges();
          if (!saved) return; // stay in edit mode so the user can fix the field
          isEditing = false;
          employeeBtn.textContent = "Edit Employees";
          employeeBtn.style.backgroundColor = "";
          employeeBtn.style.color = "";
          employeeBtn.style.borderColor = "";
          renderTable();
        }
      });

      addEmployeeBtn.addEventListener("click", () => {
        if (isEditing) {
          alert("Please save your current edits before adding a new employee.");
          return;
        }
        addModal.style.display = "flex";
      });

      closeModalBtn.addEventListener("click", () => {
        addModal.style.display = "none";
        addEmployeeForm.reset();
      });

      addEmployeeForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const nextId =
          data.employeeInformation.length > 0
            ? Math.max(
                ...data.employeeInformation.map((emp) => emp.employeeId),
              ) + 1
            : 1;

        const newEmployee = {
          employeeId: nextId,
          name: document.getElementById("newName").value.trim(),
          position: document.getElementById("newPosition").value.trim(),
          department: document.getElementById("newDepartment").value.trim(),
          salary: parseFloat(document.getElementById("newSalary").value),
          employmentHistory: document.getElementById("newHistory").value.trim(),
          contact: document.getElementById("newContact").value.trim(),
        };

        const error = validateEmployee(newEmployee);
        if (error) {
          alert(`Could not add employee: ${error}`);
          return;
        }

        data.employeeInformation.push(newEmployee);
        if (!saveToStorage()) {
          data.employeeInformation.pop(); // roll back if the save failed
          return;
        }
        renderTable();

        addModal.style.display = "none";
        addEmployeeForm.reset();
      });

      resetBtn.addEventListener("click", () => {
        const confirmReset = confirm(
          "This will discard all employee edits/additions and restore the original demo data. Continue?",
        );
        if (!confirmReset) return;

        data.employeeInformation = JSON.parse(JSON.stringify(defaultEmployees));
        saveToStorage();
        localStorage.removeItem(PAYROLL_META_KEY);
        isEditing = false;
        employeeBtn.textContent = "Edit Employees";
        employeeBtn.style.backgroundColor = "";
        employeeBtn.style.color = "";
        employeeBtn.style.borderColor = "";
        renderTable();
      });

      // ---- Lifecycle ----
      loadFromStorage();
      renderTable();

      // Keep this tab in sync if employee data changes from another tab
      window.addEventListener("storage", (e) => {
        if (e.key === EMPLOYEE_STORAGE_KEY && !isEditing) {
          loadFromStorage();
          renderTable();
        }
      });
    </script>
    <script src="nav.js"></script>
  </body>
</html>
